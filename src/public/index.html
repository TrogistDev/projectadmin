<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="container py-5" id="app">
    <div id="login-screen" class="card mx-auto shadow-sm" style="max-width: 420px;">
        <div class="card-body">
            <h4 class="card-title mb-4">Entrar no Project Admin</h4>
            <div id="login-feedback"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label for="login-email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="login-email" required>
                </div>
                <div class="mb-3">
                    <label for="login-password" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="login-password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-screen" class="d-none">
        <nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
            <div class="container-fluid">
                <span class="navbar-brand">Project Admin</span>
                <button class="btn btn-outline-secondary" id="logout-button">Sair</button>
            </div>
        </nav>

        <div id="dashboard-feedback"></div>

        <div class="row mb-3">
            <div class="col-md-4">
                <div class="card card-body mb-3">
                    <h5 class="card-title">Filtrar projetos</h5>
                    <div class="mb-3">
                        <label for="project-search" class="form-label">Buscar nome</label>
                        <input type="text" id="project-search" class="form-control" placeholder="Nome do projeto">
                    </div>
                    <div class="mb-3">
                        <label for="project-state" class="form-label">Estado</label>
                        <select id="project-state" class="form-select">
                            <option value="">Todos</option>
                            <option value="planificacion">Planejamento</option>
                            <option value="en_curso">Em curso</option>
                            <option value="pausado">Pausado</option>
                            <option value="finalizado">Finalizado</option>
                        </select>
                    </div>
                    <button class="btn btn-secondary w-100" id="refresh-projects">Atualizar</button>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card card-body mb-3">
                    <h5 class="card-title">Resumo</h5>
                    <div class="row" id="summary-cards"></div>
                </div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Projetos</h5>
                <button class="btn btn-primary" id="create-project-button">Novo projeto</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover" id="projects-table">
                        <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Responsável</th>
                            <th>Estado</th>
                            <th>Progresso</th>
                            <th>Ações</th>
                        </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="project-detail" class="card d-none">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0" id="detail-title">Detalhe do projeto</h5>
                <button class="btn btn-secondary" id="close-detail">Fechar</button>
            </div>
            <div class="card-body" id="detail-body"></div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/api-client.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
